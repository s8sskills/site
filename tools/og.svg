<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF5EC"/>
      <stop offset="1" stop-color="#F3ECDD"/>
    </linearGradient>
    <radialGradient id="glowM" cx="0.18" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#D231C8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#D231C8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.92" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#2FBEDC" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2FBEDC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D231C8"/>
      <stop offset="0.5" stop-color="#4F48C9"/>
      <stop offset="1" stop-color="#2FBEDC"/>
