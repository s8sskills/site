  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowM)"/>
  <rect width="1200" height="630" fill="url(#glowC)"/>

  <image x="60" y="135" width="360" height="360" xlink:href="../assets/brand/logo-mark.png" preserveAspectRatio="xMidYMid meet"/>

