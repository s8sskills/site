<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Site.Params.description }}" />
<link rel="canonical" href="{{ .Permalink }}" />

<meta property="og:type" content="website" />
<meta property="og:title" content="{{ .Site.Title }}" />
<meta property="og:description" content="{{ .Site.Params.description }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ "og-image.png" | absURL }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ .Site.Title }}" />
<meta name="twitter:description" content="{{ .Site.Params.description }}" />
<meta name="twitter:image" content="{{ "og-image.png" | absURL }}" />

<link rel="icon" href="{{ "favicon.ico" | relURL }}" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="{{ "icon-32.png" | relURL }}" />
<link rel="icon" type="image/png" sizes="192x192" href="{{ "icon-192.png" | relURL }}" />
<link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}" />
<meta name="theme-color" content="#0B0A18" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

{{ $css := resources.Get "css/main.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" />
