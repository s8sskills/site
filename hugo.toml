  skills = [
    { name = "vercel-project-setup", desc = "Authenticate, configure, & link local projects to Vercel" },
    { name = "vercel-deploy", desc = "Deploy production/preview builds & configure environment variables" }
  ]

[[params.providers]]
  id = "netlify"
  name = "Netlify"
