baseURL = "https://s8sskills.com/"
locale = "en-us"
title = "s8s skills — Serverless AI Skills & Serverless Agent Skills (Google Cloud Run, AWS Lambda, Vercel, Azure)"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "rss"]

[params]
  tagline = "Serverless AI Skills for Coding Agents"
  subtitle = "One command drops battle-tested serverless skills into your project, so your coding agent knows how to build and ship on every cloud."
  description = "Battle-tested Serverless AI Skills, Serverless Agent Skills, and serverless skills for your AI coding agents. Instantly add Google Cloud Run, AWS Lambda, Vercel edge, and Microsoft Azure Function skills to your project."
  keywords = "Serverless Agent Skill, serverless skills, serverless AI Skills, Google Cloud Run, AWS Lambda, Vercel, Azure, Fastly Compute, KEDA, Knative, AI coding agents, cursor skills, claude code, edge functions"
  install = "npx skills add s8sskills/gcp"
  github = "https://github.com/s8sskills"
  email = "hello@s8sskills.com"

  [params.contrib]
    title = "Share Your Great Skills"
    subtitle = "We really want you to share your great skills! Help build the ultimate, open catalog of serverless automation. If you've written skills or support a cloud, we want them!"
    link = "https://github.com/s8sskills"

  # The "s8s" wordmark is rendered as s·8·s; this is the expansion shown on hover/footer.
  expansion = "s — erverles — s"

[[params.steps]]
  num = "01"
  title = "Run one command"
  body = "`npx skills add s8sskills/gcp` pulls the vendor's skill pack straight from the s8sskills GitHub org — no account, no config."

[[params.steps]]
  num = "02"
  title = "Skills land in your repo"
  body = "Each pack installs into your project's agent skills directory, version-pinned and ready to read. Inspect them, commit them, edit them."

[[params.steps]]
  num = "03"
  title = "Your agent ships serverless"
  body = "Claude Code, Cursor, or any skills-aware agent now knows the provider's serverless idioms — scaffolding, deploy commands, gotchas and all."

