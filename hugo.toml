    { name = "azure-functions-deploy", desc = "Build & publish serverless HTTP Azure Functions" },
    { name = "azure-container-apps-deploy", desc = "Deploy scalable serverless containers to Azure Container Apps" }
  ]

[markup.goldmark.renderer]
  unsafe = true

[minify]
